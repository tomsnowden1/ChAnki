<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChAnki - Chinese to Anki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .hanzi-text {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold gradient-bg bg-clip-text text-transparent mb-2">
                ChAnki
            </h1>
            <p class="text-gray-600 text-lg">
                Search Chinese words and add them to Anki with AI-generated examples
            </p>
        </div>
        
        <!-- Service Status -->
        <div id="statusBar" class="mb-6 flex justify-center gap-4 text-sm">
            <div class="flex items-center gap-2">
                <div id="dictStatus" class="w-2 h-2 rounded-full bg-gray-400"></div>
                <span class="text-gray-600">Dictionary</span>
            </div>
            <div class="flex items-center gap-2">
                <div id="llmStatus" class="w-2 h-2 rounded-full bg-gray-400"></div>
                <span class="text-gray-600">LLM</span>
            </div>
            <div class="flex items-center gap-2">
                <div id="ankiStatus" class="w-2 h-2 rounded-full bg-gray-400"></div>
                <span class="text-gray-600">Anki</span>
            </div>
        </div>
        
        <!-- Search Bar -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <div class="flex gap-3">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter English, Pinyin, or 汉字..."
                    class="flex-1 px-6 py-4 border-2 border-gray-200 rounded-xl focus:border-purple-500 focus:outline-none text-lg transition-colors"
                    autocomplete="off"
                >
                <button 
                    id="searchBtn"
                    class="px-8 py-4 gradient-bg text-white rounded-xl font-semibold hover:opacity-90 transition-opacity focus:outline-none focus:ring-4 focus:ring-purple-300"
                >
                    Search
                </button>
            </div>
        </div>
        
        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="hidden text-center py-8">
            <div class="inline-block w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full pulse-animation"></div>
            <p class="mt-4 text-gray-600">Searching...</p>
        </div>
        
        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-50 border-2 border-red-200 rounded-xl p-4 mb-6 fade-in">
            <p class="text-red-700 font-medium"></p>
        </div>
        
        <!-- Search Results -->
        <div id="resultsContainer" class="hidden space-y-4 mb-8 fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Search Results</h2>
            <div id="resultsList" class="space-y-3"></div>
        </div>
        
        <!-- Selected Word Details -->
        <div id="wordDetails" class="hidden bg-white rounded-2xl shadow-xl p-8 mb-8 fade-in">
            <div class="text-center mb-6">
                <h2 id="selectedHanzi" class="text-6xl font-bold hanzi-text text-gray-800 mb-2"></h2>
                <p id="selectedPinyin" class="text-2xl text-purple-600 mb-3"></p>
                <p id="selectedDefinition" class="text-lg text-gray-700"></p>
            </div>
            
            <!-- Cloze Section -->
            <div id="clozeSection" class="mt-8 p-6 bg-gradient-to-r from-purple-50 to-indigo-50 rounded-xl">
                <div id="clozeLoading" class="text-center py-4">
                    <div class="inline-block w-8 h-8 border-4 border-purple-200 border-t-purple-600 rounded-full pulse-animation"></div>
                    <p class="mt-2 text-gray-600">Generating example sentence...</p>
                </div>
                
                <div id="clozeContent" class="hidden">
                    <h3 class="text-lg font-semibold text-gray-800 mb-3">Example Sentence</h3>
                    <p id="clozeSentence" class="text-2xl hanzi-text text-gray-800 mb-3"></p>
                    <p id="clozeTranslation" class="text-gray-600"></p>
                </div>
            </div>
            
            <!-- Duplicate Check -->
            <div id="duplicateWarning" class="hidden mt-6 bg-yellow-50 border-2 border-yellow-300 rounded-xl p-4">
                <p class="text-yellow-800 font-medium">⚠️ This word already exists in your Anki deck</p>
            </div>
            
            <!-- Add to Anki Button -->
            <div class="mt-6 text-center">
                <button 
                    id="addToAnkiBtn"
                    class="px-8 py-4 gradient-bg text-white rounded-xl font-semibold text-lg hover:opacity-90 transition-opacity focus:outline-none focus:ring-4 focus:ring-purple-300 disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled
                >
                    Add to Anki
                </button>
            </div>
        </div>
        
        <!-- Success Message -->
        <div id="successMessage" class="hidden bg-green-50 border-2 border-green-300 rounded-xl p-4 mb-6 fade-in">
            <p class="text-green-700 font-medium">✅ Card added successfully to Anki!</p>
        </div>
    </div>
    
    <script>
        let currentWord = null;
        let clozeData = null;
        
        // Check service status on load
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                
                document.getElementById('dictStatus').className = 
                    `w-2 h-2 rounded-full ${status.dictionary ? 'bg-green-500' : 'bg-red-500'}`;
                document.getElementById('llmStatus').className = 
                    `w-2 h-2 rounded-full ${status.llm ? 'bg-green-500' : 'bg-yellow-500'}`;
                document.getElementById('ankiStatus').className = 
                    `w-2 h-2 rounded-full ${status.anki ? 'bg-green-500' : 'bg-red-500'}`;
            } catch (error) {
                console.error('Failed to check status:', error);
            }
        }
        
        // Search functionality
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            hideError();
            hideSuccess();
            showLoading();
            hideResults();
            hideWordDetails();
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                
                if (data.success && data.results.length > 0) {
                    displayResults(data.results);
                } else {
                    showError('No results found. Try a different search term.');
                }
            } catch (error) {
                showError('Search failed. Please try again.');
            } finally {
                hideLoading();
            }
        }
        
        // Display search results
        function displayResults(results) {
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            
            results.forEach(result => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow hover:shadow-lg cursor-pointer card-hover border-2 border-transparent hover:border-purple-300 transition-all';
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="text-3xl hanzi-text font-bold text-gray-800">${result.hanzi}</span>
                            <span class="ml-3 text-lg text-purple-600">${result.pinyin}</span>
                        </div>
                        <div class="text-gray-700">${result.definitions.slice(0, 2).join('; ')}</div>
                    </div>
                `;
                div.onclick = () => selectWord(result);
                resultsList.appendChild(div);
            });
            
            document.getElementById('resultsContainer').classList.remove('hidden');
        }
        
        // Select a word and generate cloze
        async function selectWord(word) {
            currentWord = word;
            clozeData = null;
            
            // Update UI
            document.getElementById('selectedHanzi').textContent = word.hanzi;
            document.getElementById('selectedPinyin').textContent = word.pinyin;
            document.getElementById('selectedDefinition').textContent = word.definitions.join('; ');
            
            // Show word details
            document.getElementById('wordDetails').classList.remove('hidden');
            document.getElementById('clozeLoading').classList.remove('hidden');
            document.getElementById('clozeContent').classList.add('hidden');
            document.getElementById('addToAnkiBtn').disabled = true;
            document.getElementById('duplicateWarning').classList.add('hidden');
            
            // Scroll to word details
            document.getElementById('wordDetails').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Check for duplicates
            checkDuplicate(word.hanzi);
            
            // Generate cloze sentence
            await generateCloze(word);
        }
        
        // Generate cloze sentence
        async function generateCloze(word) {
            try {
                const response = await fetch('/api/generate-cloze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hanzi: word.hanzi,
                        pinyin: word.pinyin,
                        definition: word.definitions[0]
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    clozeData = {
                        sentence: data.sentence,
                        translation: data.translation
                    };
                    
                    document.getElementById('clozeSentence').textContent = data.sentence;
                    document.getElementById('clozeTranslation').textContent = data.translation;
                    document.getElementById('clozeLoading').classList.add('hidden');
                    document.getElementById('clozeContent').classList.remove('hidden');
                    document.getElementById('addToAnkiBtn').disabled = false;
                }
            } catch (error) {
                document.getElementById('clozeLoading').innerHTML = '<p class="text-red-600">Failed to generate example sentence</p>';
            }
        }
        
        // Check for duplicates
        async function checkDuplicate(hanzi) {
            try {
                const response = await fetch('/api/check-duplicate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hanzi })
                });
                
                const data = await response.json();
                
                if (data.success && data.exists) {
                    document.getElementById('duplicateWarning').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Failed to check duplicate:', error);
            }
        }
        
        // Add to Anki
        async function addToAnki() {
            if (!currentWord || !clozeData) return;
            
            const btn = document.getElementById('addToAnkiBtn');
            btn.disabled = true;
            btn.textContent = 'Adding...';
            
            try {
                const response = await fetch('/api/add-to-anki', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hanzi: currentWord.hanzi,
                        pinyin: currentWord.pinyin,
                        definition: currentWord.definitions.join('; '),
                        sentence: clozeData.sentence,
                        translation: clozeData.translation
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess(data.message);
                    document.getElementById('duplicateWarning').classList.remove('hidden');
                } else {
                    showError(data.error || 'Failed to add card to Anki');
                    btn.disabled = false;
                    btn.textContent = 'Add to Anki';
                }
            } catch (error) {
                showError('Failed to add card. Make sure Anki is running.');
                btn.disabled = false;
                btn.textContent = 'Add to Anki';
            }
        }
        
        // UI Helper functions
        function showLoading() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loadingIndicator').classList.add('hidden');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.querySelector('p').textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.querySelector('p').textContent = '✅ ' + message;
            successDiv.classList.remove('hidden');
            setTimeout(() => hideSuccess(), 5000);
        }
        
        function hideSuccess() {
            document.getElementById('successMessage').classList.add('hidden');
        }
        
        function hideResults() {
            document.getElementById('resultsContainer').classList.add('hidden');
        }
        
        function hideWordDetails() {
            document.getElementById('wordDetails').classList.add('hidden');
        }
        
        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        document.getElementById('addToAnkiBtn').addEventListener('click', addToAnki);
        
        // Check status on load
        checkStatus();
        setInterval(checkStatus, 10000); // Check every 10 seconds
    </script>
</body>
</html>
