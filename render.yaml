services:
  - type: web
    name: chanki
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SYNC_SECRET
        sync: false         # Set in Render dashboard — never commit real value
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.9.18
